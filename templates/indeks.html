<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kartu Lebaran 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to top, #1a1a40, #3a0ca3);
    color: white;
    text-align: center;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    margin: 30px auto;
}

/* BUTTON */
button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    background: pink;
    border: none;
    width: 80%;
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 100px;
}

/* MINGYU */
.mingyu {
    position: fixed;
    width: 120px;
    border-radius: 15px;
    box-shadow: 0 0 20px pink;
}
</style>
</head>

<body>

<h2>💖 Selamat Hari Raya Idul Fitri 💖</h2>

<div class="card">
<p>
Minal Aidzin Wal Faidzin 💖<br>
Mohon maaf lahir batin ✨
</p>

<textarea id="pesan" placeholder="Tulis pesan..."></textarea><br>

<button onclick="kirimPesan()">Kirim</button>
<button onclick="toggleMusic()">🎵 Play Lagu</button>

</div>

<audio id="lagu" loop>
    <source src="{{ url_for('static', filename='lagu.mp3') }}">
</audio>

<script>
// 🎤 MINGYU
setInterval(()=>{
    let img=document.createElement("img");
    img.src="{{ url_for('static', filename='mingyu.jpg') }}";
    img.className="mingyu";
    img.style.left=Math.random()*80+"vw";
    img.style.top=Math.random()*70+"vh";
    document.body.appendChild(img);
    setTimeout(()=>img.remove(),5000);
},5000);

// 💌 KIRIM
function kirimPesan(){
    let pesan=document.getElementById("pesan").value;

    fetch("/kirim",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({pesan:pesan})
    })
    .then(()=>alert("Terkirim 💖"));
}

// 🎵 MUSIC
function toggleMusic(){
    let lagu=document.getElementById("lagu");
    lagu.play().catch(()=>alert("Klik lagi ya 💖"));
}
</script>

</body>
</html>
